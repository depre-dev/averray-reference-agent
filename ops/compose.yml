services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - avg-postgres:/var/lib/postgresql/data
    networks: [avg-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./migrations:/migrations:ro
      - ./migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]
    networks: [avg-internal]

  hermes-permissions:
    image: alpine:3.20
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      [
        "/bin/sh",
        "-lc",
        "mkdir -p /opt/data/skills /opt/data/browser-profiles /data && chmod -R 0777 /opt/data /data"
      ]
    volumes:
      - avg-hermes:/opt/data
      - avg-data:/data
      - ../hermes/profiles:/opt/data/browser-profiles
      - avg-hermes-skills:/opt/data/skills
    networks: [avg-internal]

  mcp-bundle:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: avg-node-runtime
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
    user: root
    command:
      [
        "/bin/sh",
        "-lc",
        "rm -rf /runtime-app/* && cp -a /app/. /runtime-app/ && chmod -R a+rX /runtime-app"
      ]
    volumes:
      - avg-app:/runtime-app
    networks: [avg-internal]

  skills-observer:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: avg-node-runtime
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
    command: ["node", "services/skills-observer/dist/index.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HERMES_SKILLS_DIR: /hermes-skills
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-hermes:/opt/data:ro
      - avg-hermes-skills:/hermes-skills:ro
    networks: [avg-internal]

  hermes:
    image: ${HERMES_IMAGE}
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
      mcp-bundle:
        condition: service_completed_successfully
      skills-observer:
        condition: service_started
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      HERMES_DEFAULT_MODEL: ${HERMES_DEFAULT_MODEL:-qwen3.5:cloud}
      HERMES_COMPARISON_MODEL: ${HERMES_COMPARISON_MODEL:-kimi-k2.5:cloud}
      TRACE_HTTP_PORT: ${TRACE_HTTP_PORT:-8789}
      TRACE_HTTP_URL: http://127.0.0.1:${TRACE_HTTP_PORT:-8789}/hermes-event
      DATABASE_URL: ${DATABASE_URL}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL}
      AGENT_WALLET_PRIVATE_KEY: ${AGENT_WALLET_PRIVATE_KEY}
      POLICY_CONFIG_PATH: /config/policy.yaml
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      WALLET_NETWORK: testnet
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-hermes:/opt/data
      - avg-app:/app:ro
      - avg-data:/data
      - ../hermes/config/hermes.yaml:/opt/data/config.yaml:ro
      - ../hermes/config/policy.yaml:/config/policy.yaml:ro
      - ../hermes/plugins:/opt/data/plugins:ro
      - ../hermes/profiles:/opt/data/browser-profiles
      - avg-hermes-skills:/opt/data/skills
    networks: [avg-internal]
    # Keep dashboard internal. Use Tailscale/SSH tunnel to reach 127.0.0.1:9119 on the VPS.
    command: ["dashboard", "--host", "127.0.0.1", "--port", "9119"]

volumes:
  avg-postgres:
  avg-data:
  avg-app:
  avg-hermes:
  avg-hermes-skills:

networks:
  avg-internal:
    internal: false
