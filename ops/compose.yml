services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - avg-postgres:/var/lib/postgresql/data
    networks: [avg-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./migrations:/migrations:ro
      - ./migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]
    networks: [avg-internal]

  hermes-permissions:
    image: alpine:3.20
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      [
        "/bin/sh",
        "-lc",
        "mkdir -p /opt/data/skills /opt/data/browser-profiles /data && chmod -R 0777 /opt/data /data"
      ]
    volumes:
      - avg-hermes:/opt/data
      - avg-data:/data
      - ../hermes/profiles:/opt/data/browser-profiles
      - avg-hermes-skills:/opt/data/skills
    networks: [avg-internal]

  mcp-bundle:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
    user: root
    command:
      [
        "/bin/sh",
        "-lc",
        "rm -rf /runtime-app/* && cp -a /app/. /runtime-app/ && chmod -R a+rX /runtime-app"
      ]
    volumes:
      - avg-app:/runtime-app
    networks: [avg-internal]

  mcp-env:
    image: alpine:3.20
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL}
      AGENT_WALLET_PRIVATE_KEY: ${AGENT_WALLET_PRIVATE_KEY}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      HERMES_DEFAULT_MODEL: ${HERMES_DEFAULT_MODEL:-glm-5.2:cloud}
      HERMES_COMPARISON_MODEL: ${HERMES_COMPARISON_MODEL:-qwen3.5:cloud}
      LLM_USAGE_LOG_PATH: ${LLM_USAGE_LOG_PATH:-/data/llm-usage.jsonl}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_HELPER_LIMIT: ${GITHUB_HELPER_LIMIT:-5}
      GITHUB_MONITOR_PR_LIMIT: ${GITHUB_MONITOR_PR_LIMIT:-20}
      AVERRAY_HANDOFF_EVENTS_PATH: ${AVERRAY_HANDOFF_EVENTS_PATH:-/data/handoff-events.jsonl}
      TRACE_HTTP_PORT: ${TRACE_HTTP_PORT:-8789}
      TRACE_HTTP_URL: http://127.0.0.1:${TRACE_HTTP_PORT:-8789}/hermes-event
      POLICY_CONFIG_PATH: /config/policy.yaml
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      WALLET_NETWORK: testnet
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-mcp-env:/mcp-env
      - ./write-mcp-env.sh:/write-mcp-env.sh:ro
    entrypoint: ["/bin/sh", "/write-mcp-env.sh", "/mcp-env/reference-agent.env"]
    networks: [avg-internal]

  skills-observer:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    restart: unless-stopped
    # Hermes owns the skills volume as UID 10000 and continuously re-secures it to
    # mode 0700 (owner-only) as it writes, so no chmod / hermes-permissions pass keeps
    # it readable by the image's default appuser (10001) -- every inotify watch then
    # fails EACCES and this service crash-loops. Read as that same owner UID. The
    # mount below stays read-only; the observer only ever reads.
    user: "10000:10000"
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
    command: ["node", "services/skills-observer/dist/index.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HERMES_SKILLS_DIR: /hermes-skills
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-hermes:/opt/data:ro
      - avg-hermes-skills:/hermes-skills:ro
    networks: [avg-internal]

  slack-operator:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mcp-bundle:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command: ["node", "services/slack-operator/dist/index.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL}
      AGENT_WALLET_PRIVATE_KEY: ${AGENT_WALLET_PRIVATE_KEY}
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      WALLET_NETWORK: testnet
      SLACK_OPERATOR_ENABLED: ${SLACK_OPERATOR_ENABLED:-0}
      SLACK_OPERATOR_HTTP_PORT: ${SLACK_OPERATOR_HTTP_PORT:-8790}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_OPERATOR_CHANNEL_ID: ${SLACK_OPERATOR_CHANNEL_ID:-}
      SLACK_OPERATOR_CHANNEL_IDS: ${SLACK_OPERATOR_CHANNEL_IDS:-}
      SLACK_OPERATOR_ROUTINE_CHANNEL_ID: ${SLACK_OPERATOR_ROUTINE_CHANNEL_ID:-}
      SLACK_OPERATOR_DAILY_BRIEF_ENABLED: ${SLACK_OPERATOR_DAILY_BRIEF_ENABLED:-0}
      SLACK_OPERATOR_DAILY_BRIEF_TIME_UTC: ${SLACK_OPERATOR_DAILY_BRIEF_TIME_UTC:-08:00}
      SLACK_OPERATOR_DAILY_BRIEF_INCLUDE_GITHUB: ${SLACK_OPERATOR_DAILY_BRIEF_INCLUDE_GITHUB:-0}
      SLACK_OPERATOR_DAILY_GITHUB_BRIEF_ENABLED: ${SLACK_OPERATOR_DAILY_GITHUB_BRIEF_ENABLED:-0}
      SLACK_OPERATOR_DAILY_GITHUB_BRIEF_TIME_UTC: ${SLACK_OPERATOR_DAILY_GITHUB_BRIEF_TIME_UTC:-08:05}
      SLACK_OPERATOR_OPS_HEALTH_ENABLED: ${SLACK_OPERATOR_OPS_HEALTH_ENABLED:-0}
      SLACK_OPERATOR_OPS_HEALTH_TIME_UTC: ${SLACK_OPERATOR_OPS_HEALTH_TIME_UTC:-08:05}
      SLACK_OPERATOR_SAFE_WORK_SCAN_INTERVAL_MINUTES: ${SLACK_OPERATOR_SAFE_WORK_SCAN_INTERVAL_MINUTES:-0}
      SLACK_OPERATOR_SAFE_WORK_NOTIFY_ONLY_ON_AVAILABLE: ${SLACK_OPERATOR_SAFE_WORK_NOTIFY_ONLY_ON_AVAILABLE:-1}
      # D4 — off-device operator alert bridge (board action-needed 0→≥1 → Slack).
      # Off by default; needs the flag AND SLACK_WEBHOOK_URL to send.
      D4_ALERT_BRIDGE_ENABLED: ${D4_ALERT_BRIDGE_ENABLED:-0}
      D4_ALERT_BRIDGE_INTERVAL_MINUTES: ${D4_ALERT_BRIDGE_INTERVAL_MINUTES:-1}
      D4_ALERT_BRIDGE_COOLDOWN_MINUTES: ${D4_ALERT_BRIDGE_COOLDOWN_MINUTES:-30}
      D4_ALERT_QUIET_HOURS: ${D4_ALERT_QUIET_HOURS:-}
      D4_ALERT_QUIET_TZ_OFFSET_MIN: ${D4_ALERT_QUIET_TZ_OFFSET_MIN:-0}
      SLACK_OPERATOR_MONITOR_URL: ${SLACK_OPERATOR_MONITOR_URL:-https://monitor.averray.com/monitor}
      # D3 — tiered anomaly auto-pause (the autopilot fail-safe). Off by default;
      # the operator enables it BEFORE turning on autopilot. A soft trip suspends
      # autopilot (flag persisted on /data so it survives a restart); a hard trip
      # also touches HALT_FILE. Thresholds live in hermes/config/policy.yaml.
      D3_ANOMALY_PAUSE_ENABLED: ${D3_ANOMALY_PAUSE_ENABLED:-0}
      D3_ANOMALY_PAUSE_INTERVAL_MINUTES: ${D3_ANOMALY_PAUSE_INTERVAL_MINUTES:-1}
      AVERRAY_AUTOPILOT_SUSPENDED_PATH: ${AVERRAY_AUTOPILOT_SUSPENDED_PATH:-/data/autopilot-suspended.json}
      HERMES_DISPATCH_PER_DAY_MAX: ${HERMES_DISPATCH_PER_DAY_MAX:-10}
      # O4-PR3 — autopilot auto-approval. Mode persisted on /data (default
      # supervised). The auto-approval reuses the O4-PR1 dispatch guardrail, so
      # slack-operator needs the allowlist + per-repo cap too. FAIL-CLOSED: an
      # empty allowlist means autopilot can auto-approve NOTHING — the operator
      # opts repos in here before turning autopilot on. high-risk always escalates.
      AVERRAY_AUTONOMY_MODE_PATH: ${AVERRAY_AUTONOMY_MODE_PATH:-/data/autonomy-mode.json}
      # Operator-private per-card notes (checklist + note). Operator-only; never
      # part of any agent payload. Persisted on /data so notes survive a restart.
      AVERRAY_OPERATOR_CARD_NOTES_PATH: ${AVERRAY_OPERATOR_CARD_NOTES_PATH:-/data/operator-card-notes.json}
      HERMES_DISPATCH_ALLOWED_REPOS: ${HERMES_DISPATCH_ALLOWED_REPOS:-}
      HERMES_DISPATCH_PER_REPO_PER_DAY_MAX: ${HERMES_DISPATCH_PER_REPO_PER_DAY_MAX:-5}
      HERMES_DISPATCH_PER_DAY_USD_MAX: ${HERMES_DISPATCH_PER_DAY_USD_MAX:-0}
      # O5 — task health self-management. Reconciles the durable JSON queue
      # after failed tasks / stale runner state: bounded retries first, then
      # operator escalation. Still respects D3/HALT and the dispatch guardrail.
      O5_TASK_HEALTH_ENABLED: ${O5_TASK_HEALTH_ENABLED:-1}
      O5_TASK_HEALTH_INTERVAL_MINUTES: ${O5_TASK_HEALTH_INTERVAL_MINUTES:-5}
      O5_TASK_HEALTH_MAX_RETRIES: ${O5_TASK_HEALTH_MAX_RETRIES:-1}
      O5_TASK_HEALTH_RETRY_BACKOFF_MINUTES: ${O5_TASK_HEALTH_RETRY_BACKOFF_MINUTES:-15}
      O5_TASK_HEALTH_APPROVED_STALE_MINUTES: ${O5_TASK_HEALTH_APPROVED_STALE_MINUTES:-30}
      O5_TASK_HEALTH_RUNNING_STALE_MINUTES: ${O5_TASK_HEALTH_RUNNING_STALE_MINUTES:-20}
      O5_TASK_HEALTH_RESTART_RECOVERY_MINUTES: ${O5_TASK_HEALTH_RESTART_RECOVERY_MINUTES:-10}
      # B2 — self-healing. On a failure: PROPOSE a routed fix (non-high-risk) that
      # still flows through the approval/autopilot gate, or ESCALATE (high-risk /
      # rollback / D3-suspended / HALT). Off by default; never auto-approves.
      # Deduped (one open fix per target signature) + cooldown'd + capped per
      # tick. B2_SELF_HEALING_REPO is the repo a proposed fix targets (falls
      # back to GITHUB_DEFAULT_REPO).
      B2_SELF_HEALING_ENABLED: ${B2_SELF_HEALING_ENABLED:-0}
      B2_SELF_HEALING_INTERVAL_MINUTES: ${B2_SELF_HEALING_INTERVAL_MINUTES:-5}
      B2_SELF_HEALING_COOLDOWN_MINUTES: ${B2_SELF_HEALING_COOLDOWN_MINUTES:-30}
      # Per-tick proposal cap: old failed missions should not all propose on
      # first arm. Extra eligible failures are cooled down and retried later.
      B2_SELF_HEALING_MAX_PROPOSALS_PER_TICK: ${B2_SELF_HEALING_MAX_PROPOSALS_PER_TICK:-1}
      # Concurrent open-fix cap: stops a batch of distinct failures from swarming
      # the queue even within the daily budget (escalates past the cap).
      B2_SELF_HEALING_MAX_OPEN_FIXES: ${B2_SELF_HEALING_MAX_OPEN_FIXES:-3}
      # Failed testbed missions older than this are retained as history but do
      # not feed B2 self-healing. Prevents pre-wiring/environmental failures
      # from repeatedly proposing fixes after newer missions have run.
      B2_SELF_HEALING_TESTBED_FAILURE_MAX_AGE_HOURS: ${B2_SELF_HEALING_TESTBED_FAILURE_MAX_AGE_HOURS:-72}
      B2_SELF_HEALING_REPO: ${B2_SELF_HEALING_REPO:-}
      # ORCH-P4b — Hermes router routine. Off by default; proposes roadmap-
      # backed tasks only, narrates them in the monitor rail, and never
      # approves/dispatches. Reuses HERMES_DISPATCH_* allowlist/caps.
      HERMES_ROUTER_ENABLED: ${HERMES_ROUTER_ENABLED:-0}
      HERMES_ROUTER_INTERVAL_MINUTES: ${HERMES_ROUTER_INTERVAL_MINUTES:-5}
      HERMES_ROUTER_COOLDOWN_MINUTES: ${HERMES_ROUTER_COOLDOWN_MINUTES:-30}
      HERMES_ROUTER_MAX_PROPOSALS_PER_TICK: ${HERMES_ROUTER_MAX_PROPOSALS_PER_TICK:-1}
      HERMES_ROUTER_RECENTLY_DONE_LOOKBACK_HOURS: ${HERMES_ROUTER_RECENTLY_DONE_LOOKBACK_HOURS:-72}
      # ORCH-P4c anti-entrenchment (learned routing). When ON, learned routing
      # occasionally routes a soft surface to an under-sampled *allowed* agent so
      # it can build a baseline the classifier's default would otherwise starve —
      # deterministic, bounded, soft-surfaces-only, always explained on the card.
      # OFF by default; the hard Codex wall + dispatch policy are never affected,
      # and every explored task is still operator-approved before it runs.
      HERMES_ROUTER_ANTI_ENTRENCHMENT: ${HERMES_ROUTER_ANTI_ENTRENCHMENT:-0}
      HERMES_ROUTER_BACKLOG_LIMIT: ${HERMES_ROUTER_BACKLOG_LIMIT:-12}
      HERMES_ROUTER_DEFAULT_REPO: ${HERMES_ROUTER_DEFAULT_REPO:-}
      SLACK_OPERATOR_MONITOR_ENABLED: ${SLACK_OPERATOR_MONITOR_ENABLED:-0}
      SLACK_OPERATOR_MONITOR_TOKEN: ${SLACK_OPERATOR_MONITOR_TOKEN:-}
      SLACK_ALLOWED_USER_IDS: ${SLACK_ALLOWED_USER_IDS:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_HELPER_LIMIT: ${GITHUB_HELPER_LIMIT:-5}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com/v1}
      HERMES_MONITOR_REPLY_MODEL: ${HERMES_MONITOR_REPLY_MODEL:-glm-5.2:cloud}
      # Preferred co-pilot transport: the real agentic Hermes via the gateway
      # Session API (MCP tools + skills + memory), instead of the stateless Ollama
      # completion above. OFF by default (fail-closed). Enable only with the
      # command-center gateway up: set ENABLED=1, point URL at hermes-gateway:8642,
      # reuse HERMES_GATEWAY_API_KEY as the token. Falls back to Ollama on any
      # gateway failure, so flipping this on can never mute the co-pilot.
      HERMES_SESSION_API_ENABLED: ${HERMES_SESSION_API_ENABLED:-0}
      HERMES_API_URL: ${HERMES_API_URL:-}
      HERMES_API_TOKEN: ${HERMES_API_TOKEN:-}
      HERMES_SESSION_TIMEOUT_MS: ${HERMES_SESSION_TIMEOUT_MS:-}
      # Feature #3 — live-token streaming for the co-pilot's "Ask Hermes" replies.
      # When ON (and the gateway session transport above resolves), the co-pilot
      # streams Hermes's reply token-by-token over the board SSE instead of
      # landing it whole on the next poll. OFF by default; degraded-safe — any
      # streaming failure falls back to the sync session turn, so the co-pilot
      # reply is never muted or faked.
      HERMES_COPILOT_STREAMING: ${HERMES_COPILOT_STREAMING:-0}
      # #4 — co-pilot MCP elicitation (inline tool-call approvals in the rail).
      # GROUNDWORK ONLY, OFF by default (fail-closed). The Hermes gateway does
      # not expose MCP elicitation yet (Session API = create/chat/fork; stream =
      # assistant.delta/run.completed only — no tool-confirmation event, no answer
      # endpoint), so this gates NOTHING today: with the flag on it still falls
      # closed to DENY. It is a dormant scaffold until the gateway support in
      # docs/HERMES_COPILOT_ELICITATION.md lands. NEVER auto-approves a tool call.
      HERMES_COPILOT_ELICITATION: ${HERMES_COPILOT_ELICITATION:-0}
      HERMES_COPILOT_ELICITATION_TIMEOUT_MS: ${HERMES_COPILOT_ELICITATION_TIMEOUT_MS:-}
      # ORCH-P4c — agentic router backlog. When ON (needs the gateway session AND
      # a non-empty dispatch.allowed_repos), Hermes reasons over the live board to
      # propose board-grounded work gaps, augmenting the deterministic roadmap
      # backlog. Everything still flows through the hard taxonomy + dispatch-policy
      # + operator gate. OFF by default; falls back to the roadmap backlog on any
      # failure. One session turn per router tick.
      HERMES_ROUTER_AGENTIC_BACKLOG: ${HERMES_ROUTER_AGENTIC_BACKLOG:-0}
      HERMES_ROUTER_AGENTIC_MAX_ITEMS: ${HERMES_ROUTER_AGENTIC_MAX_ITEMS:-3}
      # Feature #5 — agentic router narration. When ON (needs the gateway session),
      # each router proposal is narrated by the real agentic Hermes (its own board
      # context), grounded ONLY in the proposal fields. Tagged "live" on success;
      # OFF by default and degraded-safe: falls back to the persona completion, then
      # the canned template (tagged "templated"). One session turn per proposal.
      HERMES_ROUTER_AGENTIC_NARRATION: ${HERMES_ROUTER_AGENTIC_NARRATION:-0}
      # Hermes failure analysis — when ON (needs the gateway session), a scheduled
      # routine asks the real agentic Hermes for ONE grounded paragraph on WHY a
      # failed operator-decision card likely failed + a fix/rollback next step
      # (or an explicit "cause unclear" when signals are thin), cached per card and
      # rendered as "Hermes's read" in the drawer. Grounded ONLY in the card's real
      # failure fields — no fabricated cause, no template fallback. OFF by default
      # and degraded-safe: with the gateway down it writes nothing and the drawer
      # keeps its "Ask Hermes" pointer. Reads cards only; never mutates anything.
      HERMES_FAILURE_ANALYSIS: ${HERMES_FAILURE_ANALYSIS:-0}
      HERMES_FAILURE_ANALYSIS_INTERVAL_MINUTES: ${HERMES_FAILURE_ANALYSIS_INTERVAL_MINUTES:-5}
      HERMES_FAILURE_ANALYSIS_MAX_PER_TICK: ${HERMES_FAILURE_ANALYSIS_MAX_PER_TICK:-3}
      AVERRAY_CARD_FAILURE_ANALYSIS_PATH: ${AVERRAY_CARD_FAILURE_ANALYSIS_PATH:-/data/card-failure-analysis.json}
      LLM_USAGE_LOG_PATH: ${LLM_USAGE_LOG_PATH:-/data/llm-usage.jsonl}
      HERMES_MONITOR_MEMORY_PATH: ${HERMES_MONITOR_MEMORY_PATH:-/data/hermes-monitor-memory.json}
      AVERRAY_HANDOFF_EVENTS_PATH: ${AVERRAY_HANDOFF_EVENTS_PATH:-/data/handoff-events.jsonl}
      AVERRAY_CODEX_TASKS_PATH: ${AVERRAY_CODEX_TASKS_PATH:-/data/codex-tasks.json}
      AVERRAY_TESTBED_MISSIONS_PATH: ${AVERRAY_TESTBED_MISSIONS_PATH:-/data/testbed-missions.json}
      TESTBED_MISSION_ENVIRONMENT: ${TESTBED_MISSION_ENVIRONMENT:-}
      # Tester-capability awareness for the monitor/API: it builds the
      # /monitor/tester/capabilities manifest and gates mission dispatch on these.
      # They MUST mirror the testbed-mission-runner service so one .env drives both;
      # without them the monitor hardwired runnerEnabled:false (and reported the
      # signer/session/gold-path as unavailable) even when the runner was online.
      TESTBED_MISSION_RUNNER_ENABLED: ${TESTBED_MISSION_RUNNER_ENABLED:-0}
      TESTBED_MISSION_RUNNER_EXECUTOR: ${TESTBED_MISSION_RUNNER_EXECUTOR:-playwright}
      TESTBED_MISSION_RUNNER_COMMAND: ${TESTBED_MISSION_RUNNER_COMMAND:-}
      TEST_WALLET_SIGNER_ENABLED: ${TEST_WALLET_SIGNER_ENABLED:-0}
      TEST_WALLET_SIGNER_BASE_URL: ${TEST_WALLET_SIGNER_BASE_URL:-http://test-wallet-signer:8791}
      TESTBED_SESSION_SIGNER_URL: ${TESTBED_SESSION_SIGNER_URL:-}
      TESTBED_SESSION_ROLE: ${TESTBED_SESSION_ROLE:-agent}
      TESTBED_SESSION_TYPE: ${TESTBED_SESSION_TYPE:-browser}
      TESTBED_SESSION_STORAGE_STATE_PATH: ${TESTBED_SESSION_STORAGE_STATE_PATH:-}
      TESTBED_SESSION_TOKEN: ${TESTBED_SESSION_TOKEN:-}
      TESTBED_GOLDPATH_LIVE: ${TESTBED_GOLDPATH_LIVE:-0}
      TESTBED_GOLDPATH_AUTONOMY_ENABLED: ${TESTBED_GOLDPATH_AUTONOMY_ENABLED:-0}
      AVERRAY_TESTBED_ENVIRONMENT: ${AVERRAY_TESTBED_ENVIRONMENT:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-data:/data
    networks: [avg-internal]
    ports:
      - "127.0.0.1:${SLACK_OPERATOR_HTTP_PORT:-8790}:${SLACK_OPERATOR_HTTP_PORT:-8790}"

  testbed-mission-runner:
    init: true
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    profiles: ["testbed-runner"]
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
      mcp-bundle:
        condition: service_completed_successfully
    command: ["node", "services/slack-operator/dist/testbed-mission-runner.js"]
    environment:
      AVERRAY_TESTBED_MISSIONS_PATH: ${AVERRAY_TESTBED_MISSIONS_PATH:-/data/testbed-missions.json}
      TESTBED_MISSION_RUNNER_ENABLED: ${TESTBED_MISSION_RUNNER_ENABLED:-0}
      TESTBED_MISSION_RUNNER_ID: ${TESTBED_MISSION_RUNNER_ID:-vps-hermes-testbed-runner}
      TESTBED_MISSION_RUNNER_EXECUTOR: ${TESTBED_MISSION_RUNNER_EXECUTOR:-playwright}
      TESTBED_MISSION_RUNNER_COMMAND: ${TESTBED_MISSION_RUNNER_COMMAND:-}
      TESTBED_MISSION_RUNNER_ARGS: ${TESTBED_MISSION_RUNNER_ARGS:-}
      TESTBED_MISSION_RUNNER_CWD: ${TESTBED_MISSION_RUNNER_CWD:-}
      TESTBED_MISSION_RUNNER_POLL_INTERVAL_MS: ${TESTBED_MISSION_RUNNER_POLL_INTERVAL_MS:-10000}
      TESTBED_MISSION_RUNNER_TIMEOUT_MS: ${TESTBED_MISSION_RUNNER_TIMEOUT_MS:-1200000}
      TESTBED_MISSION_RUNNER_OUTPUT_TAIL_BYTES: ${TESTBED_MISSION_RUNNER_OUTPUT_TAIL_BYTES:-12000}
      TESTBED_MISSION_BROWSER_EXECUTABLE_PATH: ${TESTBED_MISSION_BROWSER_EXECUTABLE_PATH:-/usr/bin/chromium}
      TESTBED_MISSION_ARTIFACTS_DIR: ${TESTBED_MISSION_ARTIFACTS_DIR:-/data/testbed-mission-artifacts}
      TESTBED_MISSION_MAX_BROWSER_STEPS: ${TESTBED_MISSION_MAX_BROWSER_STEPS:-12}
      TESTBED_MISSION_ENVIRONMENT: ${TESTBED_MISSION_ENVIRONMENT:-}
      TESTBED_MISSION_CAPTURE_TRACE: ${TESTBED_MISSION_CAPTURE_TRACE:-1}
      TESTBED_MISSION_CAPTURE_VIDEO: ${TESTBED_MISSION_CAPTURE_VIDEO:-1}
      # Cloudflare Access edge auth for app.averray.com. Values are service
      # token secrets and must never appear in logs, prompts, or reports.
      TESTBED_CF_ACCESS_CLIENT_ID: ${TESTBED_CF_ACCESS_CLIENT_ID:-}
      TESTBED_CF_ACCESS_CLIENT_SECRET: ${TESTBED_CF_ACCESS_CLIENT_SECRET:-}
      # Caddy HTTP Basic Auth — the REAL edge gate on app.averray.com. Secrets;
      # never logged, prompted, or written to a report. Sent only to the gated
      # host(s) listed in TESTBED_BASIC_AUTH_HOSTS.
      TESTBED_BASIC_AUTH_USER: ${TESTBED_BASIC_AUTH_USER:-}
      TESTBED_BASIC_AUTH_PASS: ${TESTBED_BASIC_AUTH_PASS:-}
      TESTBED_BASIC_AUTH_HOSTS: ${TESTBED_BASIC_AUTH_HOSTS:-app.averray.com}
      # Worker wallet — citation_repair / gold-path dry-run preflight calls
      # wallet_status (reads AGENT_WALLET_PRIVATE_KEY) to derive the address.
      # Board citation_repair runs are read-only/dry-run; real claim/submit
      # settlement stays operator-gated in the hermes container. Testnet only.
      AGENT_WALLET_PRIVATE_KEY: ${AGENT_WALLET_PRIVATE_KEY}
      WALLET_NETWORK: testnet
      # Citation-repair workflow preflight also reads the shared policy store
      # (DATABASE_URL — mutation-policy checks prior claim/submit attempts;
      # missing it surfaces as policy_store_unavailable) and records handoff
      # events + reads the policy config. Read-only on dry-run; same shared DB.
      DATABASE_URL: ${DATABASE_URL}
      AVERRAY_HANDOFF_EVENTS_PATH: ${AVERRAY_HANDOFF_EVENTS_PATH:-/data/handoff-events.jsonl}
      POLICY_CONFIG_PATH: /config/policy.yaml
      # T4 live gold-path driver. Default is off so CI/test deploys keep the
      # deterministic fake path; when enabled the runner invokes Claude with
      # Playwright-MCP/browser tooling and writes a structured report.
      TESTBED_GOLDPATH_LIVE: ${TESTBED_GOLDPATH_LIVE:-0}
      TESTBED_GOLDPATH_CLAUDE_COMMAND: ${TESTBED_GOLDPATH_CLAUDE_COMMAND:-claude}
      TESTBED_GOLDPATH_CLAUDE_ARGS: '${TESTBED_GOLDPATH_CLAUDE_ARGS:-["-p","{prompt}"]}'
      TESTBED_GOLDPATH_TIMEOUT_MS: ${TESTBED_GOLDPATH_TIMEOUT_MS:-1200000}
      TESTBED_GOLDPATH_AUTH_PROBED_ROUTE: ${TESTBED_GOLDPATH_AUTH_PROBED_ROUTE:-}
      TESTBED_GOLDPATH_DEEP: ${TESTBED_GOLDPATH_DEEP:-0}
      TESTBED_GOLDPATH_MODEL: ${TESTBED_GOLDPATH_MODEL:-}
      # T4 autonomy gate for operator-scheduled/per-deploy gold-path missions.
      # Off unless the operator sets a testnet-only spend budget.
      TESTBED_GOLDPATH_AUTONOMY_ENABLED: ${TESTBED_GOLDPATH_AUTONOMY_ENABLED:-0}
      TESTBED_GOLDPATH_MAX_USDC_PER_DAY: ${TESTBED_GOLDPATH_MAX_USDC_PER_DAY:-0}
      TESTBED_GOLDPATH_MAX_STAKE_USD_PER_RUN: ${TESTBED_GOLDPATH_MAX_STAKE_USD_PER_RUN:-0}
      TESTBED_GOLDPATH_MAX_CONCURRENT_RUNS: ${TESTBED_GOLDPATH_MAX_CONCURRENT_RUNS:-1}
      TESTBED_GOLDPATH_READY_JOBS_PATH: ${TESTBED_GOLDPATH_READY_JOBS_PATH:-docs/ready-to-post-jobs.json}
      TESTBED_GOLDPATH_READY_JOB_ID: ${TESTBED_GOLDPATH_READY_JOB_ID:-}
      CLAUDE_WORKER_AUTH_MODE: ${CLAUDE_WORKER_AUTH_MODE:-sub}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # T1 surface sweep: public base URL for relative public routes + the env's
      # truth boundary the honesty check asserts. Leave EXPECTED_BOUNDARY empty
      # for the self-consistency checks only (errored-but-silent /
      # empty-unlabeled); set demo / testnet / local-simulation to ALSO require
      # that marker on data-bearing surfaces.
      AVERRAY_APP_BASE_URL: ${AVERRAY_APP_BASE_URL:-}
      TESTBED_SURFACE_SWEEP_BASE_URL: ${TESTBED_SURFACE_SWEEP_BASE_URL:-https://averray.com}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL:-}
      AVERRAY_TESTBED_EXPECTED_BOUNDARY: ${AVERRAY_TESTBED_EXPECTED_BOUNDARY:-}
      # T3b SIWE auth mission: the sidecar base URL + the role-gated probe paths.
      TEST_WALLET_SIGNER_BASE_URL: ${TEST_WALLET_SIGNER_BASE_URL:-http://test-wallet-signer:8791}
      TESTBED_AUTH_ADMIN_JOBS_PATH: ${TESTBED_AUTH_ADMIN_JOBS_PATH:-/admin/jobs}
      TESTBED_AUTH_VERIFIER_RUN_PATH: ${TESTBED_AUTH_VERIFIER_RUN_PATH:-/verifier/run}
      TESTBED_AUTH_PROTECTED_PATH: ${TESTBED_AUTH_PROTECTED_PATH:-/admin/jobs}
      # T2 pre-seeded session: lets the surface sweep reach the AUTHED operator
      # pages. Source (a) the T3 signer sidecar (SIGNER_URL + ROLE), or (b) a
      # manually-provided storageState path / Bearer token. ALL EMPTY ⇒ the
      # sweep runs public-only (graceful fallback). Read-only; never logs secrets.
      TESTBED_SESSION_SIGNER_URL: ${TESTBED_SESSION_SIGNER_URL:-}
      TESTBED_SESSION_ROLE: ${TESTBED_SESSION_ROLE:-agent}
      TESTBED_SESSION_TYPE: ${TESTBED_SESSION_TYPE:-browser}
      TESTBED_SESSION_STORAGE_STATE_PATH: ${TESTBED_SESSION_STORAGE_STATE_PATH:-}
      TESTBED_SESSION_TOKEN: ${TESTBED_SESSION_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-data:/data
    networks: [avg-internal]

