# Optional Cloudflare Access/Tunnel overlay for the Hermes Workspace command
# center and private handoff monitor. This publishes selected internal HTTP
# services through Cloudflare Zero Trust without opening public inbound ports on
# the VPS.
#
# Cloudflare dashboard settings:
# - Tunnel public hostname: command.example.com
# - Tunnel service URL: http://hermes-workspace:3000
# - Optional monitor hostname: monitor.example.com
# - Optional monitor service URL: http://slack-operator:8790
# - Access apps: self-hosted, same hostnames, allow only explicit operator
#   emails.
services:
  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    profiles: ["command-center"]
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      hermes-workspace:
        condition: service_started
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARED_TUNNEL_TOKEN:?Set CLOUDFLARED_TUNNEL_TOKEN in .env.prod}"]
    networks: [avg-internal]
