      HALT_FILE: ${HALT_FILE:-/data/HALT}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-data:/data
    networks: [avg-internal]

  # C3 docs specialist runner — same off-by-default Claude-family runner
  # pattern, pinned to agent=="docs" and isolated by the per-agent claim filter.
  docs-task-runner:
    init: true
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    profiles: ["docs-runner"]
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
      mcp-bundle:
        condition: service_completed_successfully
    command: ["node", "services/slack-operator/dist/claude-task-runner.js"]
    environment:
      AVERRAY_CODEX_TASKS_PATH: ${AVERRAY_CODEX_TASKS_PATH:-/data/codex-tasks.json}
      CLAUDE_TASK_RUNNER_ENABLED: ${DOCS_TASK_RUNNER_ENABLED:-0}
      CLAUDE_TASK_RUNNER_ID: ${DOCS_TASK_RUNNER_ID:-vps-docs-task-runner}
      CLAUDE_TASK_RUNNER_AGENT: docs
      CLAUDE_TASK_RUNNER_COMMAND: ${CLAUDE_TASK_RUNNER_COMMAND:-node}
      CLAUDE_TASK_RUNNER_ARGS: ${DOCS_TASK_RUNNER_ARGS:-services/slack-operator/dist/docs-branch-worker.js}
      CLAUDE_TASK_RUNNER_CWD: ${CLAUDE_TASK_RUNNER_CWD:-}
      CLAUDE_TASK_RUNNER_POLL_INTERVAL_MS: ${CLAUDE_TASK_RUNNER_POLL_INTERVAL_MS:-10000}
      CLAUDE_TASK_RUNNER_TIMEOUT_MS: ${CLAUDE_TASK_RUNNER_TIMEOUT_MS:-5400000}
      CLAUDE_TASK_RUNNER_OUTPUT_TAIL_BYTES: ${CLAUDE_TASK_RUNNER_OUTPUT_TAIL_BYTES:-12000}
      CLAUDE_BRANCH_WORKER_ROOT: ${CLAUDE_BRANCH_WORKER_ROOT:-/data/claude-worker}
      CLAUDE_BRANCH_WORKER_ALLOWED_REPOS: ${CLAUDE_BRANCH_WORKER_ALLOWED_REPOS:-}
      CLAUDE_BRANCH_WORKER_BASE_BRANCH: ${CLAUDE_BRANCH_WORKER_BASE_BRANCH:-main}
      CLAUDE_BRANCH_WORKER_CLAUDE_COMMAND: ${CLAUDE_BRANCH_WORKER_CLAUDE_COMMAND:-claude}
      CLAUDE_BRANCH_WORKER_CLAUDE_ARGS: ${CLAUDE_BRANCH_WORKER_CLAUDE_ARGS:-}
      CLAUDE_BRANCH_WORKER_OUTPUT_FORMAT: ${CLAUDE_BRANCH_WORKER_OUTPUT_FORMAT:-stream-json}
      CLAUDE_BRANCH_WORKER_PERMISSION_MODE: ${CLAUDE_BRANCH_WORKER_PERMISSION_MODE:-acceptEdits}
      CLAUDE_BRANCH_WORKER_VERBOSE: ${CLAUDE_BRANCH_WORKER_VERBOSE:-1}
      CLAUDE_BRANCH_WORKER_GIT_USER_NAME: ${CLAUDE_BRANCH_WORKER_GIT_USER_NAME:-Averray Claude Worker}
      CLAUDE_BRANCH_WORKER_GIT_USER_EMAIL: ${CLAUDE_BRANCH_WORKER_GIT_USER_EMAIL:-claude-worker@averray.local}
      CLAUDE_WORKER_AUTH_MODE: ${CLAUDE_WORKER_AUTH_MODE:-sub}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_WORKER_DAILY_BUDGET: ${CLAUDE_WORKER_DAILY_BUDGET:-}
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-data:/data
    networks: [avg-internal]

  hermes:
    image: ${HERMES_IMAGE}
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
      mcp-bundle:
        condition: service_completed_successfully
      mcp-env:
        condition: service_completed_successfully
      skills-observer:
        condition: service_started
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      HERMES_DEFAULT_MODEL: ${HERMES_DEFAULT_MODEL:-glm-5.2:cloud}
      HERMES_COMPARISON_MODEL: ${HERMES_COMPARISON_MODEL:-qwen3.5:cloud}
      LLM_USAGE_LOG_PATH: ${LLM_USAGE_LOG_PATH:-/data/llm-usage.jsonl}
      TRACE_HTTP_PORT: ${TRACE_HTTP_PORT:-8789}
      TRACE_HTTP_URL: http://127.0.0.1:${TRACE_HTTP_PORT:-8789}/hermes-event
      DATABASE_URL: ${DATABASE_URL}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL}
      AGENT_WALLET_PRIVATE_KEY: ${AGENT_WALLET_PRIVATE_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_HELPER_LIMIT: ${GITHUB_HELPER_LIMIT:-5}
      AVERRAY_HANDOFF_EVENTS_PATH: ${AVERRAY_HANDOFF_EVENTS_PATH:-/data/handoff-events.jsonl}
      POLICY_CONFIG_PATH: /config/policy.yaml
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      WALLET_NETWORK: testnet
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-hermes:/opt/data
      - avg-app:/app:ro
      - avg-data:/data
      - avg-mcp-env:/config-runtime:ro
      - ../hermes/config/hermes.yaml:/opt/data/config.yaml:ro
      - ../hermes/config/policy.yaml:/config/policy.yaml:ro
      - ../hermes/plugins:/opt/data/plugins:ro
      - ../hermes/profiles:/opt/data/browser-profiles
      - avg-hermes-skills:/opt/data/skills
    networks: [avg-internal]
    # Headless backend only — the Hermes-native browser dashboard is retired.
    # v0.18 made `dashboard --insecure` a no-op: a non-loopback dashboard/serve
    # bind now refuses to start without an auth provider (that was the v0.17→
    # v0.18 dashboard crash-loop). `dashboard` and `serve` boot the same
    # start_server backend; the auth gate only engages on a NON-loopback bind.
    # We operate via the slack-operator SPA behind Cloudflare Access, not the
    # Hermes UI, so run `serve` (headless gateway backend) on container-loopback
    # — crash-free, not exposed (no host port-map). The shared /opt/data backend
    # keeps running exactly as the dashboard's backend did.
    command: ["serve", "--host", "127.0.0.1", "--port", "9119"]

volumes:
  avg-postgres:
  avg-data:
  avg-app:
  avg-mcp-env:
  avg-hermes:
  avg-hermes-skills:

networks:
  avg-internal:
    internal: false
