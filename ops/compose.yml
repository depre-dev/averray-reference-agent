services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - avg-postgres:/var/lib/postgresql/data
    networks: [avg-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./migrations:/migrations:ro
      - ./migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]
    networks: [avg-internal]

  hermes-permissions:
    image: alpine:3.20
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      [
        "/bin/sh",
        "-lc",
        "mkdir -p /opt/data/skills /opt/data/browser-profiles /data && chmod -R 0777 /opt/data /data"
      ]
    volumes:
      - avg-hermes:/opt/data
      - avg-data:/data
      - ../hermes/profiles:/opt/data/browser-profiles
      - avg-hermes-skills:/opt/data/skills
    networks: [avg-internal]

  mcp-bundle:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
    user: root
    command:
      [
        "/bin/sh",
        "-lc",
        "rm -rf /runtime-app/* && cp -a /app/. /runtime-app/ && chmod -R a+rX /runtime-app"
      ]
    volumes:
      - avg-app:/runtime-app
    networks: [avg-internal]

  mcp-env:
    image: alpine:3.20
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL}
      AGENT_WALLET_PRIVATE_KEY: ${AGENT_WALLET_PRIVATE_KEY}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      HERMES_DEFAULT_MODEL: ${HERMES_DEFAULT_MODEL:-deepseek-v4-pro:cloud}
      HERMES_COMPARISON_MODEL: ${HERMES_COMPARISON_MODEL:-qwen3.5:cloud}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_HELPER_LIMIT: ${GITHUB_HELPER_LIMIT:-5}
      GITHUB_MONITOR_PR_LIMIT: ${GITHUB_MONITOR_PR_LIMIT:-20}
      AVERRAY_HANDOFF_EVENTS_PATH: ${AVERRAY_HANDOFF_EVENTS_PATH:-/data/handoff-events.jsonl}
      TRACE_HTTP_PORT: ${TRACE_HTTP_PORT:-8789}
      TRACE_HTTP_URL: http://127.0.0.1:${TRACE_HTTP_PORT:-8789}/hermes-event
      POLICY_CONFIG_PATH: /config/policy.yaml
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      WALLET_NETWORK: testnet
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-mcp-env:/mcp-env
      - ./write-mcp-env.sh:/write-mcp-env.sh:ro
    entrypoint: ["/bin/sh", "/write-mcp-env.sh", "/mcp-env/reference-agent.env"]
    networks: [avg-internal]

  skills-observer:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
    command: ["node", "services/skills-observer/dist/index.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HERMES_SKILLS_DIR: /hermes-skills
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-hermes:/opt/data:ro
      - avg-hermes-skills:/hermes-skills:ro
    networks: [avg-internal]

  slack-operator:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mcp-bundle:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command: ["node", "services/slack-operator/dist/index.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL}
      AGENT_WALLET_PRIVATE_KEY: ${AGENT_WALLET_PRIVATE_KEY}
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      WALLET_NETWORK: testnet
      SLACK_OPERATOR_ENABLED: ${SLACK_OPERATOR_ENABLED:-0}
      SLACK_OPERATOR_HTTP_PORT: ${SLACK_OPERATOR_HTTP_PORT:-8790}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_OPERATOR_CHANNEL_ID: ${SLACK_OPERATOR_CHANNEL_ID:-}
      SLACK_OPERATOR_CHANNEL_IDS: ${SLACK_OPERATOR_CHANNEL_IDS:-}
      SLACK_OPERATOR_ROUTINE_CHANNEL_ID: ${SLACK_OPERATOR_ROUTINE_CHANNEL_ID:-}
      SLACK_OPERATOR_DAILY_BRIEF_ENABLED: ${SLACK_OPERATOR_DAILY_BRIEF_ENABLED:-0}
      SLACK_OPERATOR_DAILY_BRIEF_TIME_UTC: ${SLACK_OPERATOR_DAILY_BRIEF_TIME_UTC:-08:00}
      SLACK_OPERATOR_DAILY_BRIEF_INCLUDE_GITHUB: ${SLACK_OPERATOR_DAILY_BRIEF_INCLUDE_GITHUB:-0}
      SLACK_OPERATOR_DAILY_GITHUB_BRIEF_ENABLED: ${SLACK_OPERATOR_DAILY_GITHUB_BRIEF_ENABLED:-0}
      SLACK_OPERATOR_DAILY_GITHUB_BRIEF_TIME_UTC: ${SLACK_OPERATOR_DAILY_GITHUB_BRIEF_TIME_UTC:-08:05}
      SLACK_OPERATOR_OPS_HEALTH_ENABLED: ${SLACK_OPERATOR_OPS_HEALTH_ENABLED:-0}
      SLACK_OPERATOR_OPS_HEALTH_TIME_UTC: ${SLACK_OPERATOR_OPS_HEALTH_TIME_UTC:-08:05}
      SLACK_OPERATOR_SAFE_WORK_SCAN_INTERVAL_MINUTES: ${SLACK_OPERATOR_SAFE_WORK_SCAN_INTERVAL_MINUTES:-0}
      SLACK_OPERATOR_SAFE_WORK_NOTIFY_ONLY_ON_AVAILABLE: ${SLACK_OPERATOR_SAFE_WORK_NOTIFY_ONLY_ON_AVAILABLE:-1}
      # D4 — off-device operator alert bridge (board action-needed 0→≥1 → Slack).
      # Off by default; needs the flag AND SLACK_WEBHOOK_URL to send.
      D4_ALERT_BRIDGE_ENABLED: ${D4_ALERT_BRIDGE_ENABLED:-0}
      D4_ALERT_BRIDGE_INTERVAL_MINUTES: ${D4_ALERT_BRIDGE_INTERVAL_MINUTES:-1}
      D4_ALERT_BRIDGE_COOLDOWN_MINUTES: ${D4_ALERT_BRIDGE_COOLDOWN_MINUTES:-30}
      D4_ALERT_QUIET_HOURS: ${D4_ALERT_QUIET_HOURS:-}
      D4_ALERT_QUIET_TZ_OFFSET_MIN: ${D4_ALERT_QUIET_TZ_OFFSET_MIN:-0}
      SLACK_OPERATOR_MONITOR_URL: ${SLACK_OPERATOR_MONITOR_URL:-https://monitor.averray.com/monitor}
      # D3 — tiered anomaly auto-pause (the autopilot fail-safe). Off by default;
      # the operator enables it BEFORE turning on autopilot. A soft trip suspends
      # autopilot (flag persisted on /data so it survives a restart); a hard trip
      # also touches HALT_FILE. Thresholds live in hermes/config/policy.yaml.
      D3_ANOMALY_PAUSE_ENABLED: ${D3_ANOMALY_PAUSE_ENABLED:-0}
      D3_ANOMALY_PAUSE_INTERVAL_MINUTES: ${D3_ANOMALY_PAUSE_INTERVAL_MINUTES:-1}
      AVERRAY_AUTOPILOT_SUSPENDED_PATH: ${AVERRAY_AUTOPILOT_SUSPENDED_PATH:-/data/autopilot-suspended.json}
      HERMES_DISPATCH_PER_DAY_MAX: ${HERMES_DISPATCH_PER_DAY_MAX:-10}
      # O4-PR3 — autopilot auto-approval. Mode persisted on /data (default
      # supervised). The auto-approval reuses the O4-PR1 dispatch guardrail, so
      # slack-operator needs the allowlist + per-repo cap too. FAIL-CLOSED: an
      # empty allowlist means autopilot can auto-approve NOTHING — the operator
      # opts repos in here before turning autopilot on. high-risk always escalates.
      AVERRAY_AUTONOMY_MODE_PATH: ${AVERRAY_AUTONOMY_MODE_PATH:-/data/autonomy-mode.json}
      HERMES_DISPATCH_ALLOWED_REPOS: ${HERMES_DISPATCH_ALLOWED_REPOS:-}
      HERMES_DISPATCH_PER_REPO_PER_DAY_MAX: ${HERMES_DISPATCH_PER_REPO_PER_DAY_MAX:-5}
      HERMES_DISPATCH_PER_DAY_USD_MAX: ${HERMES_DISPATCH_PER_DAY_USD_MAX:-0}
      SLACK_OPERATOR_MONITOR_ENABLED: ${SLACK_OPERATOR_MONITOR_ENABLED:-0}
      SLACK_OPERATOR_MONITOR_TOKEN: ${SLACK_OPERATOR_MONITOR_TOKEN:-}
      SLACK_ALLOWED_USER_IDS: ${SLACK_ALLOWED_USER_IDS:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_HELPER_LIMIT: ${GITHUB_HELPER_LIMIT:-5}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com/v1}
      HERMES_MONITOR_REPLY_MODEL: ${HERMES_MONITOR_REPLY_MODEL:-deepseek-v4-pro:cloud}
      HERMES_MONITOR_MEMORY_PATH: ${HERMES_MONITOR_MEMORY_PATH:-/data/hermes-monitor-memory.json}
      AVERRAY_HANDOFF_EVENTS_PATH: ${AVERRAY_HANDOFF_EVENTS_PATH:-/data/handoff-events.jsonl}
      AVERRAY_CODEX_TASKS_PATH: ${AVERRAY_CODEX_TASKS_PATH:-/data/codex-tasks.json}
      AVERRAY_TESTBED_MISSIONS_PATH: ${AVERRAY_TESTBED_MISSIONS_PATH:-/data/testbed-missions.json}
      TESTBED_MISSION_ENVIRONMENT: ${TESTBED_MISSION_ENVIRONMENT:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-data:/data
    networks: [avg-internal]
    ports:
      - "127.0.0.1:${SLACK_OPERATOR_HTTP_PORT:-8790}:${SLACK_OPERATOR_HTTP_PORT:-8790}"

  testbed-mission-runner:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    profiles: ["testbed-runner"]
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
      mcp-bundle:
        condition: service_completed_successfully
    command: ["node", "services/slack-operator/dist/testbed-mission-runner.js"]
    environment:
      AVERRAY_TESTBED_MISSIONS_PATH: ${AVERRAY_TESTBED_MISSIONS_PATH:-/data/testbed-missions.json}
      TESTBED_MISSION_RUNNER_ENABLED: ${TESTBED_MISSION_RUNNER_ENABLED:-0}
      TESTBED_MISSION_RUNNER_ID: ${TESTBED_MISSION_RUNNER_ID:-vps-hermes-testbed-runner}
      TESTBED_MISSION_RUNNER_EXECUTOR: ${TESTBED_MISSION_RUNNER_EXECUTOR:-playwright}
      TESTBED_MISSION_RUNNER_COMMAND: ${TESTBED_MISSION_RUNNER_COMMAND:-}
      TESTBED_MISSION_RUNNER_ARGS: ${TESTBED_MISSION_RUNNER_ARGS:-}
      TESTBED_MISSION_RUNNER_CWD: ${TESTBED_MISSION_RUNNER_CWD:-}
      TESTBED_MISSION_RUNNER_POLL_INTERVAL_MS: ${TESTBED_MISSION_RUNNER_POLL_INTERVAL_MS:-10000}
      TESTBED_MISSION_RUNNER_TIMEOUT_MS: ${TESTBED_MISSION_RUNNER_TIMEOUT_MS:-1200000}
      TESTBED_MISSION_RUNNER_OUTPUT_TAIL_BYTES: ${TESTBED_MISSION_RUNNER_OUTPUT_TAIL_BYTES:-12000}
      TESTBED_MISSION_BROWSER_EXECUTABLE_PATH: ${TESTBED_MISSION_BROWSER_EXECUTABLE_PATH:-/usr/bin/chromium}
      TESTBED_MISSION_ARTIFACTS_DIR: ${TESTBED_MISSION_ARTIFACTS_DIR:-/data/testbed-mission-artifacts}
      TESTBED_MISSION_MAX_BROWSER_STEPS: ${TESTBED_MISSION_MAX_BROWSER_STEPS:-12}
      TESTBED_MISSION_ENVIRONMENT: ${TESTBED_MISSION_ENVIRONMENT:-}
      TESTBED_MISSION_CAPTURE_TRACE: ${TESTBED_MISSION_CAPTURE_TRACE:-1}
      TESTBED_MISSION_CAPTURE_VIDEO: ${TESTBED_MISSION_CAPTURE_VIDEO:-1}
      # T1 surface sweep: base URL for relative routes (falls back to the
      # mission's targetUrl when unset) + the env's truth boundary the honesty
      # check asserts. Leave EXPECTED_BOUNDARY empty for the self-consistency
      # checks only (errored-but-silent / empty-unlabeled); set demo / testnet /
      # local-simulation to ALSO require that marker on data-bearing surfaces.
      AVERRAY_APP_BASE_URL: ${AVERRAY_APP_BASE_URL:-}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL:-}
      AVERRAY_TESTBED_EXPECTED_BOUNDARY: ${AVERRAY_TESTBED_EXPECTED_BOUNDARY:-}
      # T3b SIWE auth mission: the sidecar base URL + the role-gated probe paths.
      TEST_WALLET_SIGNER_BASE_URL: ${TEST_WALLET_SIGNER_BASE_URL:-http://test-wallet-signer:8791}
      TESTBED_AUTH_ADMIN_JOBS_PATH: ${TESTBED_AUTH_ADMIN_JOBS_PATH:-/admin/jobs}
      TESTBED_AUTH_VERIFIER_RUN_PATH: ${TESTBED_AUTH_VERIFIER_RUN_PATH:-/verifier/run}
      TESTBED_AUTH_PROTECTED_PATH: ${TESTBED_AUTH_PROTECTED_PATH:-/admin/jobs}
      # T2 pre-seeded session: lets the surface sweep reach the AUTHED operator
      # pages. Source (a) the T3 signer sidecar (SIGNER_URL + ROLE), or (b) a
      # manually-provided storageState path / Bearer token. ALL EMPTY ⇒ the
      # sweep runs public-only (graceful fallback). Read-only; never logs secrets.
      TESTBED_SESSION_SIGNER_URL: ${TESTBED_SESSION_SIGNER_URL:-}
      TESTBED_SESSION_ROLE: ${TESTBED_SESSION_ROLE:-agent}
      TESTBED_SESSION_TYPE: ${TESTBED_SESSION_TYPE:-browser}
      TESTBED_SESSION_STORAGE_STATE_PATH: ${TESTBED_SESSION_STORAGE_STATE_PATH:-}
      TESTBED_SESSION_TOKEN: ${TESTBED_SESSION_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-data:/data
    networks: [avg-internal]

  test-wallet-signer:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    profiles: ["test-wallet-signer"]
    restart: unless-stopped
    depends_on:
      mcp-bundle:
        condition: service_completed_successfully
    command: ["node", "services/test-wallet-signer/dist/index.js"]
    environment:
      TEST_WALLET_SIGNER_ENABLED: ${TEST_WALLET_SIGNER_ENABLED:-0}
      TEST_WALLET_SIGNER_ENVIRONMENT: ${TEST_WALLET_SIGNER_ENVIRONMENT:-testnet}
      TEST_WALLET_SIGNER_HOST: ${TEST_WALLET_SIGNER_HOST:-0.0.0.0}
      TEST_WALLET_SIGNER_PORT: ${TEST_WALLET_SIGNER_PORT:-8791}
      TEST_WALLET_SIGNER_REFRESH_SKEW_SECONDS: ${TEST_WALLET_SIGNER_REFRESH_SKEW_SECONDS:-60}
      TEST_WALLET_SIGNER_BROWSER_EXECUTABLE_PATH: ${TEST_WALLET_SIGNER_BROWSER_EXECUTABLE_PATH:-/usr/bin/chromium}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-3600}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL}
      AVERRAY_APP_BASE_URL: ${AVERRAY_APP_BASE_URL}
      TEST_WALLET_AGENT_PRIVATE_KEY: ${TEST_WALLET_AGENT_PRIVATE_KEY:-}
      TEST_WALLET_ADMIN_PRIVATE_KEY: ${TEST_WALLET_ADMIN_PRIVATE_KEY:-}
      TEST_WALLET_VERIFIER_PRIVATE_KEY: ${TEST_WALLET_VERIFIER_PRIVATE_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks: [avg-internal]
    ports:
      - "127.0.0.1:${TEST_WALLET_SIGNER_PORT:-8791}:${TEST_WALLET_SIGNER_PORT:-8791}"

  codex-task-runner:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    profiles: ["codex-runner"]
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
      mcp-bundle:
        condition: service_completed_successfully
    command: ["node", "services/slack-operator/dist/codex-task-runner.js"]
    environment:
      AVERRAY_CODEX_TASKS_PATH: ${AVERRAY_CODEX_TASKS_PATH:-/data/codex-tasks.json}
      CODEX_TASK_RUNNER_ENABLED: ${CODEX_TASK_RUNNER_ENABLED:-0}
      CODEX_TASK_RUNNER_ID: ${CODEX_TASK_RUNNER_ID:-vps-codex-task-runner}
      CODEX_TASK_RUNNER_COMMAND: ${CODEX_TASK_RUNNER_COMMAND:-node}
      CODEX_TASK_RUNNER_ARGS: ${CODEX_TASK_RUNNER_ARGS:-services/slack-operator/dist/codex-branch-worker.js}
      CODEX_TASK_RUNNER_CWD: ${CODEX_TASK_RUNNER_CWD:-}
      CODEX_TASK_RUNNER_POLL_INTERVAL_MS: ${CODEX_TASK_RUNNER_POLL_INTERVAL_MS:-10000}
      CODEX_TASK_RUNNER_TIMEOUT_MS: ${CODEX_TASK_RUNNER_TIMEOUT_MS:-1800000}
      CODEX_TASK_RUNNER_OUTPUT_TAIL_BYTES: ${CODEX_TASK_RUNNER_OUTPUT_TAIL_BYTES:-12000}
      CODEX_HOME: ${CODEX_HOME:-/data/codex-home}
      CODEX_BRANCH_WORKER_ROOT: ${CODEX_BRANCH_WORKER_ROOT:-/data/codex-worker}
      CODEX_BRANCH_WORKER_ALLOWED_REPOS: ${CODEX_BRANCH_WORKER_ALLOWED_REPOS:-}
      CODEX_BRANCH_WORKER_CODEX_COMMAND: ${CODEX_BRANCH_WORKER_CODEX_COMMAND:-codex}
      CODEX_BRANCH_WORKER_CODEX_ARGS: ${CODEX_BRANCH_WORKER_CODEX_ARGS:-}
      CODEX_BRANCH_WORKER_GIT_USER_NAME: ${CODEX_BRANCH_WORKER_GIT_USER_NAME:-Averray Codex Worker}
      CODEX_BRANCH_WORKER_GIT_USER_EMAIL: ${CODEX_BRANCH_WORKER_GIT_USER_EMAIL:-codex-worker@averray.local}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-data:/data
    networks: [avg-internal]

  # Claude task runner (O2). Mirrors codex-task-runner; claims approved
  # agent="claude" tasks. The startup route gate (claude-worker-auth) refuses
  # to claim on a billing-route mismatch. Disabled by default; the operator
  # enables it, sets CLAUDE_TASK_RUNNER_COMMAND to the Claude worker once it
  # lands, and provisions the auth secrets in .env.prod. For SUB billing,
  # leave ANTHROPIC_API_KEY UNSET (an empty value is treated as absent).
  claude-task-runner:
    build:
      context: ..
      dockerfile: ops/Dockerfile.node
    image: ${AVERRAY_IMAGE:-avg-node-runtime}
    profiles: ["claude-runner"]
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
      mcp-bundle:
        condition: service_completed_successfully
    command: ["node", "services/slack-operator/dist/claude-task-runner.js"]
    environment:
      AVERRAY_CODEX_TASKS_PATH: ${AVERRAY_CODEX_TASKS_PATH:-/data/codex-tasks.json}
      CLAUDE_TASK_RUNNER_ENABLED: ${CLAUDE_TASK_RUNNER_ENABLED:-0}
      CLAUDE_TASK_RUNNER_ID: ${CLAUDE_TASK_RUNNER_ID:-vps-claude-task-runner}
      # Runs the Claude worker (claude-branch-worker). Inert until the operator
      # opts in: the "claude-runner" profile + CLAUDE_TASK_RUNNER_ENABLED=1 must
      # both be set, and the worker itself refuses to act without a populated
      # CLAUDE_BRANCH_WORKER_ALLOWED_REPOS (fails closed).
      CLAUDE_TASK_RUNNER_COMMAND: ${CLAUDE_TASK_RUNNER_COMMAND:-node}
      CLAUDE_TASK_RUNNER_ARGS: ${CLAUDE_TASK_RUNNER_ARGS:-services/slack-operator/dist/claude-branch-worker.js}
      CLAUDE_TASK_RUNNER_CWD: ${CLAUDE_TASK_RUNNER_CWD:-}
      CLAUDE_TASK_RUNNER_POLL_INTERVAL_MS: ${CLAUDE_TASK_RUNNER_POLL_INTERVAL_MS:-10000}
      CLAUDE_TASK_RUNNER_TIMEOUT_MS: ${CLAUDE_TASK_RUNNER_TIMEOUT_MS:-1800000}
      CLAUDE_TASK_RUNNER_OUTPUT_TAIL_BYTES: ${CLAUDE_TASK_RUNNER_OUTPUT_TAIL_BYTES:-12000}
      # Claude branch worker (greenfield executor). Empty ALLOWED_REPOS means the
      # worker refuses every task — the operator opts each repo in explicitly.
      CLAUDE_BRANCH_WORKER_ROOT: ${CLAUDE_BRANCH_WORKER_ROOT:-/data/claude-worker}
      CLAUDE_BRANCH_WORKER_ALLOWED_REPOS: ${CLAUDE_BRANCH_WORKER_ALLOWED_REPOS:-}
      CLAUDE_BRANCH_WORKER_BASE_BRANCH: ${CLAUDE_BRANCH_WORKER_BASE_BRANCH:-main}
      CLAUDE_BRANCH_WORKER_CLAUDE_COMMAND: ${CLAUDE_BRANCH_WORKER_CLAUDE_COMMAND:-claude}
      CLAUDE_BRANCH_WORKER_CLAUDE_ARGS: ${CLAUDE_BRANCH_WORKER_CLAUDE_ARGS:-}
      CLAUDE_BRANCH_WORKER_GIT_USER_NAME: ${CLAUDE_BRANCH_WORKER_GIT_USER_NAME:-Averray Claude Worker}
      CLAUDE_BRANCH_WORKER_GIT_USER_EMAIL: ${CLAUDE_BRANCH_WORKER_GIT_USER_EMAIL:-claude-worker@averray.local}
      # Auth/billing (claude-worker-auth). Secrets sourced from .env.prod.
      CLAUDE_WORKER_AUTH_MODE: ${CLAUDE_WORKER_AUTH_MODE:-sub}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_WORKER_DAILY_BUDGET: ${CLAUDE_WORKER_DAILY_BUDGET:-}
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-data:/data
    networks: [avg-internal]

  hermes:
    image: ${HERMES_IMAGE}
    restart: unless-stopped
    depends_on:
      hermes-permissions:
        condition: service_completed_successfully
      mcp-bundle:
        condition: service_completed_successfully
      mcp-env:
        condition: service_completed_successfully
      skills-observer:
        condition: service_started
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      HERMES_DEFAULT_MODEL: ${HERMES_DEFAULT_MODEL:-deepseek-v4-pro:cloud}
      HERMES_COMPARISON_MODEL: ${HERMES_COMPARISON_MODEL:-qwen3.5:cloud}
      TRACE_HTTP_PORT: ${TRACE_HTTP_PORT:-8789}
      TRACE_HTTP_URL: http://127.0.0.1:${TRACE_HTTP_PORT:-8789}/hermes-event
      DATABASE_URL: ${DATABASE_URL}
      AVERRAY_API_BASE_URL: ${AVERRAY_API_BASE_URL}
      AGENT_WALLET_PRIVATE_KEY: ${AGENT_WALLET_PRIVATE_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER_TOKENS: ${GITHUB_OWNER_TOKENS:-}
      GITHUB_REPO_TOKENS: ${GITHUB_REPO_TOKENS:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_HELPER_REPOS: ${GITHUB_HELPER_REPOS:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_HELPER_LIMIT: ${GITHUB_HELPER_LIMIT:-5}
      AVERRAY_HANDOFF_EVENTS_PATH: ${AVERRAY_HANDOFF_EVENTS_PATH:-/data/handoff-events.jsonl}
      POLICY_CONFIG_PATH: /config/policy.yaml
      HALT_FILE: ${HALT_FILE:-/data/HALT}
      WALLET_NETWORK: testnet
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - avg-hermes:/opt/data
      - avg-app:/app:ro
      - avg-data:/data
      - avg-mcp-env:/config-runtime:ro
      - ../hermes/config/hermes.yaml:/opt/data/config.yaml:ro
      - ../hermes/config/policy.yaml:/config/policy.yaml:ro
      - ../hermes/plugins:/opt/data/plugins:ro
      - ../hermes/profiles:/opt/data/browser-profiles
      - avg-hermes-skills:/opt/data/skills
    networks: [avg-internal]
    ports:
      - "127.0.0.1:9119:9119"
    # Hermes requires --insecure for non-loopback container binds. The Docker
    # port mapping above keeps this reachable only from VPS localhost.
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--insecure"]

volumes:
  avg-postgres:
  avg-data:
  avg-app:
  avg-mcp-env:
  avg-hermes:
  avg-hermes-skills:

networks:
  avg-internal:
    internal: false
